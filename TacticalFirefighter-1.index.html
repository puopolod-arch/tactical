<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Tactical FF"/>
<meta name="theme-color" content="#1C1C1E"/>
<title>Tactical Firefighter</title>
<style>
:root{--orange:#E8640C;--charcoal:#1C1C1E;--steel:#3A3A3C;--amber:#FFBA7B;--bg:#111113;--surface2:#2C2C2E;--text:#F2F2F7;--muted:#8E8E93;--green:#30D158;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{background:var(--bg);color:var(--text);font-family:-apple-system,'Helvetica Neue',Arial,sans-serif;font-size:15px;min-height:100vh;padding-bottom:env(safe-area-inset-bottom);}
.app-header{background:var(--charcoal);border-bottom:3px solid var(--orange);padding:14px 16px 12px;position:sticky;top:0;z-index:100;}
.app-header h1{font-size:17px;font-weight:800;letter-spacing:0.08em;color:var(--text);}
.app-header p{font-size:11px;color:var(--amber);margin-top:2px;}
.save-badge{display:inline-block;font-size:10px;color:var(--green);margin-top:3px;}
.tabs{display:flex;background:var(--charcoal);padding:0 12px 12px;gap:8px;overflow-x:auto;}
.tab{flex-shrink:0;padding:7px 14px;border-radius:8px;font-size:11px;font-weight:700;letter-spacing:0.06em;border:none;cursor:pointer;transition:background 0.15s,color 0.15s;}
.tab.active{background:var(--orange);color:white;}
.tab.inactive{background:var(--steel);color:var(--muted);}
.sections{padding:12px 12px 24px;}
.section{margin-bottom:10px;border-radius:12px;overflow:hidden;border:1px solid rgba(255,255,255,0.08);}
.section-header{background:var(--charcoal);border-left:4px solid var(--orange);padding:12px 14px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;user-select:none;}
.section-label{font-size:13px;font-weight:700;color:var(--text);letter-spacing:0.04em;}
.section-tag{font-size:10px;color:var(--amber);margin-top:2px;}
.section-arrow{font-size:12px;color:var(--muted);margin-left:8px;transition:transform 0.2s;}
.section-arrow.open{transform:rotate(180deg);}
.section-body{padding:12px;}
.how-block{background:rgba(232,100,12,0.1);border-left:3px solid var(--orange);border-radius:6px;padding:10px 12px;margin-bottom:12px;font-size:11px;line-height:1.5;color:var(--amber);}
.how-block strong{color:white;}
.cd-header{background:rgba(48,209,88,0.08);border-left:3px solid var(--green);border-radius:6px;padding:8px 12px;margin:14px 0 8px;}
.cd-label{font-size:11px;font-weight:700;color:var(--green);letter-spacing:0.06em;}
.cd-tag{font-size:10px;color:var(--muted);margin-top:2px;}
.ex-table{width:100%;border-collapse:collapse;}
.ex-table th{background:var(--steel);color:white;font-size:10px;font-weight:700;letter-spacing:0.06em;padding:7px 8px;text-align:left;border-bottom:2px solid var(--orange);}
.cd-table th{background:rgba(48,209,88,0.15);color:var(--green);font-size:10px;font-weight:700;letter-spacing:0.06em;padding:7px 8px;text-align:left;border-bottom:2px solid var(--green);}
.ex-table td,.cd-table td{padding:9px 8px;font-size:12px;vertical-align:top;border-bottom:1px solid rgba(255,255,255,0.06);}
.ex-table tr:last-child td,.cd-table tr:last-child td{border-bottom:none;}
.ex-table tr:nth-child(even) td{background:rgba(255,255,255,0.025);}
.cd-table tr:nth-child(even) td{background:rgba(48,209,88,0.03);}
.ex-name{color:var(--text);font-weight:600;font-size:12px;}
.ex-sets{color:var(--amber);}
.ex-load{color:var(--orange);font-weight:600;}
.ex-cue,.cd-cue{color:var(--muted);font-size:11px;line-height:1.4;}
.cd-hold{color:var(--green);font-weight:600;white-space:nowrap;}
.editable{cursor:pointer;border-bottom:1px dashed rgba(232,100,12,0.4);padding-bottom:1px;display:inline-block;min-width:40px;}
input.edit-input{background:rgba(232,100,12,0.15);border:1px solid var(--orange);border-radius:4px;color:white;font-size:12px;padding:3px 6px;width:100%;outline:none;font-family:inherit;}
@media(max-width:480px){.col-cue{display:none;}}
.info-banner{background:rgba(232,100,12,0.1);border:1px solid rgba(232,100,12,0.3);border-radius:10px;padding:12px 14px;margin-bottom:10px;font-size:12px;line-height:1.6;color:var(--amber);}
.info-banner strong{color:white;display:block;margin-bottom:4px;font-size:13px;}
.install-banner{background:var(--surface2);border:1px solid rgba(255,255,255,0.1);border-radius:10px;padding:14px;margin-bottom:14px;}
.install-banner h3{font-size:13px;font-weight:700;color:white;margin-bottom:6px;}
.install-banner p{font-size:11px;color:var(--muted);line-height:1.5;}
.install-steps{margin-top:8px;}
.install-steps li{font-size:11px;color:var(--muted);margin:3px 0 3px 16px;}
.install-steps li span{color:var(--amber);}
.footer{text-align:center;padding:20px 16px;font-size:10px;color:var(--muted);}
.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:var(--green);color:#000;font-size:12px;font-weight:700;padding:8px 20px;border-radius:20px;opacity:0;transition:opacity 0.3s;pointer-events:none;z-index:999;}
.toast.show{opacity:1;}

.week-tracker{background:var(--charcoal);border-bottom:1px solid rgba(255,255,255,0.08);padding:12px 16px;}
.week-tracker-title{font-size:11px;font-weight:700;color:var(--muted);letter-spacing:0.08em;margin-bottom:10px;}
.weeks-grid{display:grid;grid-template-columns:repeat(8,1fr);gap:6px;}
.week-cell{display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;}
.week-circle{width:36px;height:36px;border-radius:50%;border:2px solid var(--steel);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:var(--muted);transition:all 0.2s;background:transparent;}
.week-circle.done{background:var(--green);border-color:var(--green);color:#000;}
.week-circle.current{border-color:var(--orange);color:var(--orange);}
.week-num{font-size:9px;color:var(--muted);letter-spacing:0.04em;}

.targets-panel{background:var(--surface2);border-radius:12px;margin:0 12px 10px;overflow:hidden;border:1px solid rgba(255,255,255,0.08);}
.targets-header{background:var(--charcoal);border-left:4px solid var(--amber);padding:12px 14px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;}
.targets-title{font-size:13px;font-weight:700;color:var(--text);letter-spacing:0.04em;}
.targets-sub{font-size:10px;color:var(--amber);margin-top:2px;}
.targets-body{padding:12px;}
.week-select-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px;}
.wk-btn{padding:5px 10px;border-radius:6px;font-size:11px;font-weight:700;border:none;cursor:pointer;transition:all 0.15s;}
.wk-btn.active{background:var(--orange);color:white;}
.wk-btn.done-wk{background:var(--green);color:#000;}
.wk-btn.inactive{background:var(--steel);color:var(--muted);}
.target-category{margin-bottom:10px;}
.target-cat-label{font-size:10px;font-weight:700;color:var(--orange);letter-spacing:0.08em;margin-bottom:5px;}
.target-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid rgba(255,255,255,0.05);}
.target-row:last-child{border-bottom:none;}
.target-name{font-size:12px;color:var(--text);font-weight:500;}
.target-val{font-size:12px;color:var(--amber);font-weight:700;text-align:right;}
.target-note{font-size:10px;color:var(--muted);margin-top:1px;}
.target-week-label{font-size:12px;font-weight:700;color:var(--text);margin-bottom:8px;}
.target-week-note{font-size:11px;color:var(--muted);font-style:italic;margin-bottom:10px;line-height:1.4;}
</style>
</head>
<body>
<div class="app-header">
  <h1>TACTICAL FIREFIGHTER</h1>
  <p>Tap any orange or amber value to edit</p>
  <span class="save-badge" id="saveBadge"></span>
</div>

<div class="week-tracker">
  <div class="week-tracker-title">8-WEEK PROGRESS</div>
  <div class="weeks-grid" id="weeksGrid"></div>
</div>

<div class="targets-panel">
  <div class="targets-header" onclick="toggleTargets()">
    <div>
      <div class="targets-title">&#127919; WEEKLY LOAD TARGETS</div>
      <div class="targets-sub">Tap to see week-by-week targets for your age and level</div>
    </div>
    <span class="section-arrow" id="targetsArrow">&#9660;</span>
  </div>
  <div id="targetsPanel" style="display:none;padding:12px;"></div>
</div>
<div class="tabs" id="tabBar"></div>
<div id="appContent"></div>
<div class="toast" id="toast">Saved</div>
<script>
const DEFAULTS = {

      { id:"d1c", name:"Goblet Box Squat",           sets:"3 \u00d7 12",      load:"30 lb KB",   cue:"Sit back to bench \u2014 pain-free depth only" },
      { id:"d1d", name:"Banded Push-Ups",            sets:"3 \u00d7 15",      load:"Red Band",   cue:"Full lockout at top" },

    how: "Straight sets \u2014 all sets of one exercise before moving on. Rest flexibly. Focus is control and range of motion, not load or speed.",
    exercises: [
      { id:"d2a", name:"KB Swings",              sets:"2 \u00d7 15",         load:"35 lb KB",    cue:"Explosive hip hinge \u2014 warm-up pace" },
      { id:"d2b", name:"90/90 Hip Switches",     sets:"2 min total",     load:"BW",           cue:"Controlled transitions both sides" },

// ── WEEK TRACKER ─────────────────────────────────────────────────────────────
let completedWeeks = new Set();

function loadWeeks() {
  try {
    const saved = localStorage.getItem("tactical_weeks_v1");
    if (saved) completedWeeks = new Set(JSON.parse(saved));
  } catch(e) {}
}

function saveWeeks() {
  try { localStorage.setItem("tactical_weeks_v1", JSON.stringify([...completedWeeks])); } catch(e) {}
}

function toggleWeek(n) {
  if (completedWeeks.has(n)) {
    completedWeeks.delete(n);
  } else {
    completedWeeks.add(n);
  }
  saveWeeks();
  renderWeeks();
}

function renderWeeks() {
  const grid = document.getElementById("weeksGrid");
  if (!grid) return;
  const done = completedWeeks.size;
  const current = Math.min(done + 1, 8);
  grid.innerHTML = Array.from({length:8}, (_,i) => {
    const n = i + 1;
    const isDone = completedWeeks.has(n);
    const isCurrent = !isDone && n === current;
    const cls = isDone ? "done" : isCurrent ? "current" : "";
    const icon = isDone ? "&#10003;" : n;
    return `<div class="week-cell" onclick="toggleWeek(${n})">
      <div class="week-circle ${cls}">${icon}</div>
      <div class="week-num">WK ${n}</div>
    </div>`;
  }).join("");
}

function renderTargets() {
  const panel = document.getElementById("targetsPanel");
  if (!panel) return;
  const wk = WEEK_TARGETS[selectedTargetWeek - 1];
  const weekBtns = WEEK_TARGETS.map((w,i) => {
    const n = i + 1;
    const isDone = completedWeeks.has(n);
    const isActive = n === selectedTargetWeek;
    const cls = isActive ? "active" : isDone ? "done-wk" : "inactive";
    return `<button class="wk-btn ${cls}" onclick="selectTargetWeek(${n})">W${n}</button>`;
  }).join("");

  panel.innerHTML = `
    <div class="week-select-row">${weekBtns}</div>
    <div class="target-week-label">${wk.label}</div>
    <div class="target-week-note">${wk.note}</div>
    ${wk.categories.map(cat => `
      <div class="target-category">
        <div class="target-cat-label">${cat.label}</div>
        ${cat.items.map(item => `
          <div class="target-row">
            <div>
              <div class="target-name">${item.name}</div>
              <div class="target-note">${item.note}</div>
            </div>
            <div class="target-val">${item.val}</div>
          </div>`).join("")}
      </div>`).join("")}`;
}

function selectTargetWeek(n) {
  selectedTargetWeek = n;
  renderTargets();
}

let targetsExpanded = false;
function toggleTargets() {
  targetsExpanded = !targetsExpanded;
  document.getElementById("targetsPanel").style.display = targetsExpanded ? "block" : "none";
  document.getElementById("targetsArrow").className = "section-arrow" + (targetsExpanded ? " open" : "");
}
function deepClone(o) { return JSON.parse(JSON.stringify(o)); }

function loadState() {
  try {
    const saved = localStorage.getItem("tactical_ff_v2");
    if (saved) { const p = JSON.parse(saved); if (p.program) state.program = p.program; }
  } catch(e) {}
}

function saveState() {
  try {
    localStorage.setItem("tactical_ff_v2", JSON.stringify({ program: state.program }));
    showToast("Saved \u2713");
    const b = document.getElementById("saveBadge");
    if (b) b.textContent = "Saved " + new Date().toLocaleTimeString();
  } catch(e) {}
}

function resetToDefaults() {
  if (confirm("Reset all weights and sets to defaults?")) {
    state.program = deepClone(DEFAULTS);
    saveState();
    render();
  }
}

let toastTimer;
function showToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove("show"), 1800);
}

function startEdit(el, sectionKey, exId, field) {
  const current = el.textContent.trim();
  const input = document.createElement("input");
  input.className = "edit-input";
  input.value = current;
  el.replaceWith(input);
  input.focus();
  input.select();
  function commit() {
    const val = input.value.trim() || current;
    const sec = state.program[sectionKey];
    const ex = sec.exercises.find(e => e.id === exId);
    if (ex) ex[field] = val;
    saveState();
    const span = document.createElement("span");
    span.className = el.className;
    span.textContent = val;
    span.onclick = () => startEdit(span, sectionKey, exId, field);
    input.replaceWith(span);
  }
  input.addEventListener("blur", commit);
  input.addEventListener("keydown", e => {
    if (e.key === "Enter") { e.preventDefault(); input.blur(); }
    if (e.key === "Escape") { input.value = current; input.blur(); }
  });
}

function renderTabs() {
  document.getElementById("tabBar").innerHTML = GROUP_TABS.map(g =>
    `<button class="tab ${state.activeGroup===g.key?'active':'inactive'}" onclick="switchGroup('${g.key}')">${g.label}</button>`
  ).join("");
}

function switchGroup(key) {
  state.activeGroup = key;
  renderTabs();
  renderContent();
}

function toggleSection(key) {
  state.openSections[key] = !state.openSections[key];
  renderContent();
}

function renderCooldown(cd) {
  if (!cd) return "";
  return `
    <div class="cd-header">
      <div class="cd-label">${cd.label}</div>
      <div class="cd-tag">${cd.tag}</div>
    </div>
    <div style="overflow-x:auto">
    <table class="ex-table cd-table">
      <thead><tr>
        <th>STRETCH</th><th>HOLD</th><th class="col-cue">CUE</th>
      </tr></thead>
      <tbody>
        ${cd.exercises.map(ex => `
          <tr>
            <td class="ex-name" style="color:#E0E0E0">${ex.name}</td>
            <td class="cd-hold">${ex.hold}</td>
            <td class="ex-cue col-cue">${ex.cue}</td>
          </tr>`).join("")}
      </tbody>
    </table>
    </div>`;
}

function renderSection(key) {
  const data = state.program[key];
  if (!data) return "";
  const open = !!state.openSections[key];
  return `
    <div class="section">
      <div class="section-header" onclick="toggleSection('${key}')">
        <div>
          <div class="section-label">${data.label}</div>
          <div class="section-tag">${data.tag}</div>
        </div>
        <span class="section-arrow ${open?'open':''}">&#9660;</span>
      </div>
      ${open ? `<div class="section-body">
        <div class="how-block"><strong>HOW TO RUN: </strong>${data.how}</div>
        <div style="overflow-x:auto">
        <table class="ex-table">
          <thead><tr><th>EXERCISE</th><th>SETS &times; REPS</th><th>LOAD</th><th class="col-cue">CUE</th></tr></thead>
          <tbody>
            ${data.exercises.map(ex => `
              <tr>
                <td class="ex-name">${ex.name}</td>
                <td><span class="editable ex-sets" onclick="startEdit(this,'${key}','${ex.id}','sets')">${ex.sets}</span></td>
                <td><span class="editable ex-load" onclick="startEdit(this,'${key}','${ex.id}','load')">${ex.load}</span></td>
                <td class="ex-cue col-cue">${ex.cue}</td>
              </tr>`).join("")}
          </tbody>
        </table>
        </div>
        ${renderCooldown(data.cooldown)}
      </div>` : ""}
    </div>`;
}

function renderInstall() {
  return `<div class="sections">
    <div class="install-banner">
      <h3>&#128241; Install on Samsung (Android)</h3>
      <p>Open this file in Chrome, then:</p>
      <ol class="install-steps">
        <li>Tap the <span>three dots menu</span> (top right)</li>
        <li>Tap <span>Add to Home screen</span> or <span>Install app</span></li>
        <li>Tap <span>Add</span></li>

    </div>

      <ol class="install-steps">
        <li>Go to <span>netlify.com/drop</span> on your computer</li>
        <li>Drag the HTML file onto the page</li>
        <li>Get a free permanent URL in seconds</li>
        <li>Open in Chrome on Samsung \u2192 Add to Home Screen</li>
      </ol>
    </div>
    <div class="footer">Built for Firefighters \u2022 Strength with Longevity \u2022 Shift-Proof Training</div>
  </div>`;
}

function renderContent() {
  const content = document.getElementById("appContent");
  if (state.activeGroup === "install") { content.innerHTML = renderInstall(); return; }
  const keys = state.activeGroup === "tactical"
    ? ["onShift","recovery","fpWarmup","day1","day2","day3","day4a","day4b"]
    : ["backyard_a","backyard_b"];
  const anyOpen = keys.some(k => state.openSections[k]);
  if (!anyOpen) state.openSections[keys[0]] = true;
  const banner = state.activeGroup === "backyard" ? `
    <div class="info-banner"><strong>BACKYARD TACTICAL</strong>
    Use Day A or Day B when outside with the kids. Replaces your Tactical Firefighter session for that day. Alternate A \u2192 B \u2192 A \u2192 B.</div>` : "";
  content.innerHTML = `<div class="sections">${banner}${keys.map(renderSection).join("")}
    <div class="footer">Built for Firefighters \u2022 Strength with Longevity \u2022 Shift-Proof Training</div>
  </div>`;
}

function render() { renderTabs(); renderContent(); }

loadWeeks();
renderWeeks();
renderTargets();
loadState();
state.openSections["day1"] = true;
render();
</script>
